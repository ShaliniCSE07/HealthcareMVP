<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CareXAI logo">
	<defs>
		<linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#0077ff"/>
			<stop offset="100%" stop-color="#20c05c"/>
		</linearGradient>
	</defs>

	<rect width="64" height="64" rx="16" fill="#ffffff"/>

	<!-- Heart shape background -->
	<path
		d="M32 50c-.7-.4-14.6-8.5-18.4-17.1C11.9 29.7 12 26 14 23.4 15.6 21.3 18.1 20 20.9 20c2.7 0 5.1 1.2 7.1 3.4 2-2.2 4.4-3.4 7.1-3.4 2.8 0 5.3 1.3 6.9 3.4 2 2.6 2.1 6.3.4 9.5C46.6 41.5 32.7 49.6 32 50z"
		fill="url(#heartGradient)"
	/>

	<!-- White medical cross on left side -->
	<rect x="18" y="23" width="10" height="10" rx="1.5" fill="none"/>
	<path
		d="M22.25 24.5h3.5v3.25H29v3.5h-3.25V34.5h-3.5v-3.25H18v-3.5h4.25z"
		fill="#ffffff"
	/>

	<!-- Circuit lines on right side -->
	<g stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
		<path d="M34 28 L38 32 L38 38"/>
		<path d="M38 28 L42 32 L42 40"/>
		<path d="M42 26 L46 30 L46 36"/>
	</g>

	<!-- Circuit nodes -->
	<g fill="#ffffff">
		<circle cx="34" cy="28" r="2"/>
		<circle cx="38" cy="28" r="2"/>
		<circle cx="42" cy="26" r="2"/>
		<circle cx="38" cy="38" r="2"/>
		<circle cx="42" cy="40" r="2"/>
		<circle cx="46" cy="36" r="2"/>
	</g>

	<!-- Small “spark” above right side -->
	<g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round">
		<line x1="42" y1="18" x2="42" y2="21"/>
		<line x1="38.8" y1="18.8" x2="36.9" y2="20.1"/>
		<line x1="45.2" y1="18.8" x2="47.1" y2="20.1"/>
	</g>

	<!-- Brand text (simplified, small) -->
	<text x="32" y="59" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#0060d9">
		Care<tspan fill="#16a34a">XAI</tspan>
	</text>
</svg>

